name: Docker build -> push -> deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: spring-boot-ci-demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
         

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name:  Build docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest

      - name: Push Image to docker hub
        run: docker push  ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest

      - name: SSH and deploy to ec2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          scripts: |
            docker stop spring-demo || true
            docker rm spring-demo || true
            docker pull  ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest
            docker run -d --name spring-demo -p 8080:8080  ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest

